version: '3'

services:
    api:
        image: node:9
        working_dir: /app/api
        volumes:
            - '.:/app'
            - './config:/app/config'
            - '/tmp:/tmp'
        environment:
            - NODE_ENV=development
            - HOME=/tmp
            - ADMIN_USERNAME
            - ADMIN_PASSWORD
            - JWT_SECRET_KEY
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - '/etc/passwd:/etc/passwd:ro'
        ports:
            - '5432'
