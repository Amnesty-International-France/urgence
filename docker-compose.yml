version: '3'

services:
    api:
        image: node:9
        volumes:
            - ".:/app"
            - "./config:/app/config"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
            - HOME=/tmp
        ports:
            - "4000:4000"
        user: "${UID}:${GID}"
        working_dir: /app/api
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - "/etc/passwd:/etc/passwd:ro"
        expose:
            - "5432"
        user: "${UID}:${GID}"

    nginx:
        image: nginx
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - api
            - front
            - storybook

    front:
        image: node:9
        command: "npm run start-web"
        volumes:
            - "./front:/app"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
            - HOME=/tmp
        expose:
            - "3000"
        working_dir: /app
        user: "${UID}:${GID}"

    storybook:
        image: node:9
        command: "npm run storybook"
        volumes:
            - "./front:/app"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
        expose:
            - "9009"
        working_dir: /app
        user: "${UID}:${GID}"

    admin:
        image: node:9
        command: "npm run start"
        volumes:
            - "./admin:/app"
            - "/tmp:/tmp"
        environment:
            - PORT=5000
            - NODE_ENV=development
            - HOME=/tmp
            - REACT_APP_API_URL="https://localhost/api"
        expose:
            - "5000"
        working_dir: /app
        user: "${UID}:${GID}"
