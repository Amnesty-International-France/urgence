version: '3'

services:
    admin_staging:
        image: node:9
        command: [sh, -c, "npm install --save query-string@5.1.1 && cd node_modules/ra-core && npm install --save query-string@5.1.1 && cd /app && npm run build"]
        volumes:
            - ./admin:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://amnesty.marmelab.com/admin/
            REACT_APP_API_URL: https://amnesty.marmelab.com/api/
        user: "${UID}:${GID}"
        working_dir: /app
