version: '3'

services:
    api:
        command: "npm run start"
        environment:
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - NODE_ENV=development
            - CORS_ALLOWED_ORIGIN="http://localhost"
            - JWT_SECRET_KEY="dev"

    nginx:
        image: nginx
        ports:
            - "80:80"
        volumes:
            - .:/app
            - ./var/nginx/dev.conf:/etc/nginx/conf.d/default.conf
        command: [sh, -c, "chmod -R o+X /app; chmod -R o+r /app/admin/build/; nginx -g 'daemon off;'"]
        depends_on:
            - api

    db:
        volumes:
            - "./var/data:/var/lib/postgresql/data/"
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide
