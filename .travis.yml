language: node_js
sudo: required
dist: focal

services:
    - docker

node_js:
    - '18'

install:
    - make install

cache:
    yarn: true
    directories:
        - node_modules
        - /tmp/amnesty

stages:
    - name: test

jobs:
    include:
        - stage: test
          name: 'Unit Tests'
          env: NODE_ENV=test
          script:
              - make test-unit
        - stage: test
          name: 'E2E Tests'
          env: NODE_ENV=test
          script:
              - make test-e2e
