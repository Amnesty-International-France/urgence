server {
    listen 80;

    server_name localhost;

    add_header   X-UA-Compatible "IE=edge";
    add_header   X-Frame-Options "SAMEORIGIN";

    location / {
        alias /app/front/build/;
    }

    location /admin {
        alias /app/admin/build/;
    }

    location /api {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/static {
        alias /app/uploads/;
    }

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /storybook {
        alias /app/front/storybook/;
    }

    error_log stderr;
    access_log stdout;
}
