version: '3'

services:
    admin_staging:
        image: node:9
        command: [sh, -c, "yarn install --save query-string@5.1.1 && cd node_modules/ra-core && yarn install --save query-string@5.1.1 && cd /app/admin && yarn run build"]
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://amnesty.marmelab.com/admin
            REACT_APP_API_URL: https://amnesty.marmelab.com/api
            REACT_APP_FRONT_BASE_URL: https://amnesty.marmelab.com
        user: "${UID}:${GID}"
        working_dir: /app/admin

    admin_prod:
        image: node:9
        command: [sh, -c, "yarn install --save query-string@5.1.1 && cd node_modules/ra-core && yarn install --save query-string@5.1.1 && cd /app/admin && yarn run build"]
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://rapide.amnesty.fr/admin
            REACT_APP_API_URL: https://rapide.amnesty.fr/api
            REACT_APP_FRONT_BASE_URL: https://rapide.amnesty.fr
        user: "${UID}:${GID}"
        working_dir: /app/admin


    admin_dev:
        image: node:9
        command: [sh, -c, "yarn install --save query-string@5.1.1 && cd node_modules/ra-core && yarn install --save query-string@5.1.1 && cd /app/admin && yarn run build"]
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: http://localhost/admin
            REACT_APP_API_URL: http://localhost/api
            REACT_APP_FRONT_BASE_URL: http://localhost
        user: "${UID}:${GID}"
        working_dir: /app/admin

    front_staging:
        image: node:9
        command: "yarn run build-web"
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            REACT_APP_API_URL: https://amnesty.marmelab.com/api
        user: "${UID}:${GID}"
        working_dir: /app

    front_prod:
        image: node:9
        command: "yarn run build-web"
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            REACT_APP_API_URL: https://rapide.amnesty.fr/api
        user: "${UID}:${GID}"
        working_dir: /app

    front_dev:
        image: node:9
        command: "yarn run build-web"
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            REACT_APP_API_URL: http://localhost/api
        user: "${UID}:${GID}"
        working_dir: /app

    storybook:
        image: node:9
        command: "yarn run build-storybook"
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://amnesty.marmelab.com/storybook
        user: "${UID}:${GID}"
        working_dir: /app
