version: '3'

services:
    admin:
        image: node:18.15.0
        user: '${UID}:${GID}'
        command: 'yarn run start'
        working_dir: /app/admin
        volumes:
            - '.:/app'
            - '/tmp:/tmp'
            - '~/.cache/.yarn/:/tmp/.cache/.yarn/'
            - '~/.npm/:/tmp/.npm/'
            - '~/.yarn/:/tmp/.yarn/'
        environment:
            - PORT=5000
            - NODE_ENV=development
            - HOME=/tmp
            - REACT_APP_API_URL=http://localhost:4000
            - REACT_APP_FRONT_BASE_URL=http://localhost:3000
        ports:
            - '5000:5000'

    api:
        user: '${UID}:${GID}'
        command: 'yarn run start-dev'
        environment:
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - JWT_SECRET_KEY=foobarS3CR3T!
            - API_PREFIX_URL=
            - PM2_HOME=.pm2
            - SF_BASE_URL
            - SF_API_VERSION
            - SF_CONSUMER_KEY
            - SF_CONSUMER_SECRET
            - REACT_APP_API_URL=http://localhost:4000
        ports:
            - '4000:4000'

    db:
        volumes:
            - amnesty-postgres-data:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide
            - PGDATA=/var/lib/postgresql/data/amnesty

    amnesty-components:
        image: node:18.15.0
        user: '${UID}:${GID}'
        command: 'yarn start'
        environment:
            - NODE_ENV=development
            - SHELL=bash
        volumes:
            - .:/app
        working_dir: /app/amnesty-components

    front:
        image: node:18.15.0
        user: '${UID}:${GID}'
        command: 'yarn run start-web'
        working_dir: /app/front
        volumes:
            - '.:/app'
            - '/tmp:/tmp'
            - '~/.cache/.yarn/:/tmp/.cache/.yarn/'
            - '~/.npm/:/tmp/.npm/'
            - '~/.yarn/:/tmp/.yarn/'
        environment:
            - HOME=/tmp
            - REACT_APP_API_URL=http://localhost:4000
            - NODE_ENV=development
        ports:
            - '3000:3000'

    nginx:
        image: nginx:1.22
        ports:
            - '80:80'
        volumes:
            - ./var/uploads:/usr/share/nginx/html
        command: [sh, -c, "chmod -R o+X /app; nginx -g 'daemon off;'"]

volumes:
    amnesty-postgres-data: {}
