version: '3'

services:
    api:
        command: "npm run start"
        environment:
            - NODE_ENV=staging
            - HOME=/tmp
            - POSTGRES_PASSWORD
        ports:
            - "4000:4000"
        user: "${UID}:${GID}"
        working_dir: /app/api
        depends_on:
            - db


    nginx:
        image: nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./var/nginx/staging.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - admin
            - api
            - front
            - storybook

    db:
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD
            - POSTGRES_DB=reaction-rapide
        volumes:
            - "~/amnesty/data:/var/lib/postgresql/data/"
