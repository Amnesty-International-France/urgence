stages:
  - build
  - deploy

variables:
  BROWSERSLIST_IGNORE_OLD_DATA: 'true'
  # don't treat warnings as errors
  CI: 'false'

.build: &build
  image: node:18
  tags:
    - yarn
  stage: build
  script:
    - node .yarn/releases/yarn-3.2.1.cjs --version
    - .clevercloud/static/build.sh
    - echo "transfer the compiled files"
    - cp --recursive front/build/ dist/
    - cp --recursive admin/build/ dist/admin/
    - cp .clevercloud/static/.htaccess dist/
    # the directory must exist
    - ls -lh ${PWD}/dist/
  artifacts:
    paths:
      - dist/
    expire_in: 24 hrs
    when: always

build_prod:
  <<: *build
  variables:
    REF: $CI_COMMIT_REF_SLUG
    NODE_ENV: production
    REACT_APP_NODE_ENV: production
    PUBLIC_URL: https://clevercloud.urgent.amnesty.fr
    REACT_APP_API_URL: https://clevercloud.api.urgent.amnesty.fr
    REACT_APP_FRONT_BASE_URL: https://clevercloud.urgent.amnesty.fr
    UPLOAD_URL: https://clevercloud.api.urgent.amnesty.fr/static
  only:
    - master
    - feature/AIF-1047-deploy-on-clever-cloud

##### Deploy #####
deploy_clevercloud_manual:
  image:
    name: clevercloud/clever-tools:latest
    entrypoint: [ "/bin/sh", "-c" ]
  stage: deploy
  cache: [ ]
  script: |
    clever link ${APP_ID}
    clever deploy
  variables:
    APP_ID: app_dbdec903-e149-4672-a47e-8e29a294f56e
  when: manual
  only:
    - master
    - feature/AIF-1047-deploy-on-clever-cloud
  environment:
    name: prod_api
    url: https://clevercloud.api.urgent.amnesty.fr

.upload: &upload
  stage: deploy
  image: alpine:latest
  before_script:
    - apk update && apk add --no-cache lftp
    - ls -lh ${PWD}/${DIRECTORY}
  script:
    # source: https://savjee.be/blog/gitlab-ci-deploy-to-ftp-with-lftp/
    - lftp -e "open ${FTP_HOST}; user ${FTP_USER} ${FTP_PASSWORD}; mirror --reverse --no-perms --verbose --delete ${DIRECTORY} /; bye"

upload_static_content:
  <<: *upload
  dependencies: ['build_prod']
  needs: ['build_prod']
  variables:
    DIRECTORY: 'dist/'
  only:
    - master
    - feature/AIF-1047-deploy-on-clever-cloud
  when: manual
  environment:
    name: prod_static
    url: https://clevercloud.urgent.amnesty.fr
