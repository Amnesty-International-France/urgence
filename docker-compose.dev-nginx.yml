version: '3'

services:
    maildev:
        image: djfarrelly/maildev
        expose:
            - '25'
        ports:
            - '1080:80'

    api:
        command: 'yarn run start-dev'
        environment:
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - JWT_SECRET_KEY=foobarS3CR3T!
            - SMTP_HOST=maildev
            - SMTP_PORT=25
            - SMTP_IGNORE_TLS=true
            - SMTP_USER=
            - API_PREFIX_URL=
            - PM2_HOME=.pm2
            - SF_BASE_URL
            - SF_API_VERSION
            - SF_CONSUMER_KEY
            - SF_CONSUMER_SECRET
            - SF_USERNAME
            - SF_PASSWORD
            - SF_SECURITY_TOKEN
            - UPLOAD_DIR=/app/var/uploads
            - UPLOAD_URL=http://127.0.0.1/api/static
        ports:
            - '4000:4000'

    nginx:
        image: nginx:1.22
        ports:
            - '80:80'
        volumes:
            - .:/app
            - ./var/nginx/dev.conf:/etc/nginx/conf.d/default.conf
        command:
            [sh, -c, "chmod -R o+X /app; chmod -R o+r /app/admin/build/; nginx -g 'daemon off;'"]
        depends_on:
            - api

    db:
        volumes:
            - amnesty-postgres-data:/var/lib/postgresql/data
        user: '${UID}:${GID}'
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide
            - PGDATA=/var/lib/postgresql/data/amnesty

volumes:
    amnesty-postgres-data: {}
