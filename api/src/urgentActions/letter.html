<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow" />
    <style>
        body {
            font-size: 10px;
            line-height: 15px;
        }

        .date {
            margin-left: 60%;
        }

        .recipient {
            margin-top: 1.19cm;
            margin-left: 7cm;
        }

        .subject {
            margin-top: 1cm;
            font-size: 12px;
        }

        .subject strong {
            text-decoration: underline;
        }

        .signature {
            font-size: 12px;
            margin-top: 3cm;
            text-align: right;
        }
    </style>
</head>

<body>
    <p class="address">
        {{ signature }}
        <br />{{emitterAddress|escape|nl2br}}
    </p>
    <p class="recipient">
        {{ recipientAddress|escape|nl2br }}
        <br />
        <br /> Le {{ date }}
    </p>
    <div class="message">
        <h3 class="subject">
            <strong>Objet :</strong> {{ subject }}
        </h3>
        {% for message in urgentAction.message_template %}
        <p>{{ message.value|escape|nl2br }}</p>
        {% endfor %}
        <p class="signature">{{ signature }}</p>
    </div>
</body>

</html>
