version: '3'

services:
    api:
        image: node:9
        command: "yarn start"
        volumes:
            - ".:/app"
            - "./config:/app/config"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV
            - HOME=/tmp
        ports:
            - "4000:4000"
        user: "${UID}:${GID}"
        working_dir: /app/api
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - "./var/data:/var/lib/postgresql/data/"
            - "/etc/passwd:/etc/passwd:ro"
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD
            - POSTGRES_DB=reaction-rapide
        expose:
            - "5432"
        user: "${UID}:${GID}"

    front:
        image: node:9
        command: "npm run start-web"
        volumes:
            - "./front:/app"
        environment:
            - NODE_ENV=development
        ports:
            - "3000:3000"
        working_dir: /app
