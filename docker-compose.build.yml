version: '3'

services:
    admin_staging:
        image: node:9
        command: 'yarn run build'
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://amnesty.marmelab.com/admin
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: https://amnesty.marmelab.com/api
            REACT_APP_FRONT_BASE_URL: https://amnesty.marmelab.com
        working_dir: /app/admin

    admin_prod:
        image: node:9
        command: 'yarn run build'
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://rapide.amnesty.fr/admin
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: https://rapide.amnesty.fr/api
            REACT_APP_FRONT_BASE_URL: https://rapide.amnesty.fr
        working_dir: /app/admin

    admin_dev:
        image: node:9
        command: 'yarn run build'
        volumes:
            - .:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: http://localhost/admin
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: http://localhost/api
            REACT_APP_FRONT_BASE_URL: http://localhost
        working_dir: /app/admin

    front_staging:
        image: node:9
        command: 'yarn run build-web'
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            BABEL_ENV: staging
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: https://amnesty.marmelab.com/api
            REACT_APP_GA: UA-136476291-1
            REACT_APP_FB: '2252258794861771'
        working_dir: /app

    front_prod:
        image: node:9
        command: 'yarn run build-web'
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            BABEL_ENV: production
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: https://rapide.amnesty.fr/api
            REACT_APP_GA: UA-5960278-37
            REACT_APP_FB: '364255110870457'
        working_dir: /app

    front_dev:
        image: node:9
        command: 'yarn run build-web'
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            BABEL_ENV: development
            REACT_APP_NODE_ENV: production
            REACT_APP_API_URL: http://localhost/api
            REACT_APP_GA: UA-136476291-2
            REACT_APP_FB: '2385476921667035'
        working_dir: /app

    storybook:
        image: node:9
        command: 'yarn run build-storybook'
        volumes:
            - ./front:/app
        environment:
            NODE_ENV: production
            PUBLIC_URL: https://amnesty.marmelab.com/storybook
        working_dir: /app
