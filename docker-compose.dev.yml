version: '3'

services:
    admin:
        image: node:9
        command: "npm run start"
        volumes:
            - "./admin:/app"
            - "/tmp:/tmp"
        environment:
            - PORT=5000
            - NODE_ENV=development
            - HOME=/tmp
            - REACT_APP_API_URL=http://localhost:4000/
        ports:
            - "5000:5000"
        working_dir: /app
        user: "${UID}:${GID}"

    api:
        command: "npm run start-dev"

    db:
        volumes:
            - "./var/data:/var/lib/postgresql/data/"
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide
