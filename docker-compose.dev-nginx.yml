version: '3'

services:
    api:
        command: 'yarn run start'
        environment:
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - NODE_ENV=development
            - CORS_ALLOWED_ORIGIN="http://localhost"
            - JWT_SECRET_KEY="dev"
            - SMTP_HOST=maildev
            - SMTP_PORT=25
            - SMTP_USER
            - SMTP_IGNORE_TLS=true
            - SF_BASE_URL
            - SF_CONSUMER_KEY
            - SF_CONSUMER_SECRET
            - SF_USERNAME
            - SF_PASSWORD
            - SF_SECURITY_TOKEN

    maildev:
        image: djfarrelly/maildev
        expose:
            - '25'
        ports:
            - '1080:80'

    nginx:
        image: nginx
        ports:
            - '80:80'
        volumes:
            - .:/app
            - ./var/nginx/dev.conf:/etc/nginx/conf.d/default.conf
        command:
            [sh, -c, "chmod -R o+X /app; chmod -R o+r /app/admin/build/; nginx -g 'daemon off;'"]
        depends_on:
            - api

    db:
        volumes:
            - amnesty-postgres-data:/var/lib/postgresql/data/
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide
        ports:
            - '5432:5432'

volumes:
    amnesty-postgres-data: {}
