version: '3'

services:
    hub:
        image: selenium/hub:2.53.0

    chrome:
        image: selenium/node-chrome:2.53.0
        environment:
            - HUB_PORT_4444_TCP_ADDR=hub
        depends_on:
            - hub
        links:
            - hub
            - front
            - api

    chromedebug:
        image: selenium/node-chrome-debug:2.53.0
        environment:
            - HUB_PORT_4444_TCP_ADDR=hub
        links:
            - hub
            - front
            - api
        ports:
            - 5900:5900

    test-e2e:
        image: node:9
        links:
            - hub
            - front
            - api
        depends_on:
            - hub
            - chrome
        environment:
            NODE_ENV: test
        command: npm run test-e2e
        volumes:
            - ./front:/app
        working_dir: /app

    front:
        image: node:9
        command: "npm run start-web"
        volumes:
            - "./front:/app"
            - "/tmp:/tmp"
        environment:
            - HOME=/tmp
            - REACT_APP_API_URL=http://api:4000
            - NODE_ENV=development
        working_dir: /app
        user: "${UID}:${GID}"

    api:
        command: npm run start-dev
        environment:
            NODE_ENV: development
            JWT_SECRET_KEY: jwtsecret
            POSTGRES_DATABASE: reaction-rapide-e2e

    db:
        environment:
            POSTGRES_USER: amnesty
            POSTGRES_PASSWORD: amnesty
            POSTGRES_DB: reaction-rapide-e2e
