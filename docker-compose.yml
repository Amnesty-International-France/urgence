version: '3'

services:
    api:
        image: node:9
        volumes:
            - ".:/app"
            - "./config:/app/config"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
            - HOME=/tmp
        user: "${UID}:${GID}"
        working_dir: /app/api
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - "/etc/passwd:/etc/passwd:ro"
        expose:
            - "5432"
        user: "${UID}:${GID}"

    front:
        image: node:9
        command: "npm run start-web"
        volumes:
            - "./front:/app"
            - "/tmp:/tmp"
        environment:
            - HOME=/tmp
        working_dir: /app
        user: "${UID}:${GID}"
