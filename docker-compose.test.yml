version: '3'

services:
    test:
        image: node:9
        command: 'yarn run test'
        working_dir: /app
        volumes:
            - './:/app'
        user: '${UID}:${GID}'
        environment:
            - NODE_ENV=test
            - POSTGRES_DATABASE=reaction-rapide-test
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - JWT_SECRET_KEY=foobarS3CR3T
            - REACT_APP_FRONT_BASE_URL=http://localhost:3000
            - REACT_APP_API_URL=http://localhost:4000
            - API_PREFIX_URL=
        depends_on:
            - db

    api:
        command: 'yarn run start-dev'
        user: '${UID}:${GID}'
        environment:
            NODE_ENV: test
            POSTGRES_DATABASE: reaction-rapide-test

    db:
        volumes:
            - amnesty-postgres-data:/var/lib/postgresql/data
        user: '${UID}:${GID}'
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide-test
            - PGDATA=/var/lib/postgresql/data/amnesty-test

volumes:
    amnesty-postgres-data: {}
