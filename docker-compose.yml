version: '3'

services:
    api:
        image: node:9
        command: "yarn start"
        volumes:
            - ".:/app"
            - "./config:/app/config"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
            - HOME=/tmp
        ports:
            - "4000:4000"
        user: "${UID}:${GID}"
        working_dir: /app/api
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - "/etc/passwd:/etc/passwd:ro"
        expose:
            - "5432"
        user: "1000:1000"

    front:
        image: node:9
        command: "npm run start-web"
        volumes:
            - "./front:/app"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
        ports:
            - "3000:3000"
        working_dir: /app

    storybook:
        image: node:9
        command: "npm run storybook"
        volumes:
            - "./front:/app"
        environment:
            - NODE_ENV=development
        ports:
            - "9009:9009"
        working_dir: /app
