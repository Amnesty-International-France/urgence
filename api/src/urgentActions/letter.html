<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow" />
    <style>
        body {
            font-size: 12px;
            line-height: 1.5;
        }

        .date {
            margin-left: 60%;
        }

        .message {
            margin-top: 6cm;
        }

        .subject {
            margin-top: 1cm;
            font-size: 14px;
        }

        .subject strong {
            text-decoration: underline;
        }

        .signature {
            font-size: 14px;
            margin-top: 3cm;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="message">
        <p class="date">Le {{ date }}</p>
        <h3 class="subject">
            <strong>Objet :</strong> {{ subject }}
        </h3>
        {% for message in urgentAction.message_template %}
            <p>{{ message.value }}</p>
        {% endfor %}
        <p class="signature">{{ signature }}</p>
    </div>
</body>
</html>
