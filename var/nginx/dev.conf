limit_req_zone $binary_remote_addr zone=letterMailSendingLimit:10m rate=5r/m;

server {
    listen 80;

    server_name localhost;

    add_header   X-UA-Compatible "IE=edge";
    add_header   X-Frame-Options "SAMEORIGIN";

    

    location / {
        alias /app/front/build/;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
    
    location ~ ^/ua/ {
        if ($http_user_agent ~* "^twitter$") {
            proxy_pass http://api:4000/api/metadata$uri$is_args$args;
        }

        if ($http_user_agent ~* "^Twitter$") {
            proxy_pass http://api:4000/api/metadata$uri$is_args$args;
        }

        if ($http_user_agent ~* "^facebook$") {
            proxy_pass http://api:4000/api/metadata$uri$is_args$args;
        }

        if ($http_user_agent ~* "^Facebook$") {
            proxy_pass http://api:4000/api/metadata$uri$is_args$args;
        }


        alias /app/front/build/;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location ^((\/fonts|\/static)(\/?.*))|(candle.svg|favicon.ico|global.css)$ {
        expires 30d;
        add_header Vary Accept-Encoding;
    }

    location /admin {
        alias /app/admin/build/;
    }

    location /api {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/static {
        alias /app/uploads;
        expires 30d;
        add_header Vary Accept-Encoding;
    }

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^\/api\/.*\.pdf$ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^\/api\/.*\/send$ {
        limit_req zone=letterMailSendingLimit burst=10 nodelay;

        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /storybook {
        alias /app/front/storybook/;
    }

    error_log stderr;
    access_log stdout;
}
