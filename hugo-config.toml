baseURL = "http://localhost:1500"
languageCode = 'fr'
defaultContentLanguage = 'fr'
title = "Actions Urgentes - Amnesty France"

pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
pygmentsUseClasses = true

[outputFormats.SearchIndex]
baseName = "search"
mediaType = "application/json"

[outputs]
home = [ "HTML", "SearchIndex" ]

# Controls how many words are printed in the content summary on the docs homepage.
# See https://gohugo.io/content-management/summaries/
summaryLength = 50

[[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

[[menu.main]]
    name = "Documentation"
    url = "/docs/"
    weight = 2

[[menu.main]]
    name = "Exploitation"
    url = "/exploitation/"
    weight = 3

[[menu.main]]
    name = "ADRs"
    url = "/adrs/"
    weight = 4

[[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 5

[params]
  homepage_button_link = '/docs/quick-overview-of-the-project/'
  homepage_button_text = "Vue d'ensemble du projet"
  mainSections = ['docs', 'exploitation', 'adrs', 'search']
  footer_link_url = 'https://www.amnesty.fr/inscription/actions-urgentes-sms'
  footer_link_title = 'Amnesty'

  [params.logo]
      mobile = "/images/logo.jpg"
      standard  = "/images/logo.jpg"
