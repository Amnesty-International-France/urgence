name: Deploy Production

on:
  push:
    tags:
      - '*'

env:
  BROWSERSLIST_IGNORE_OLD_DATA: 'true'
  CI: 'false'

jobs:
  build-static:
    name: Build Static (Production)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      REACT_APP_NODE_ENV: production
      FRONT_PUBLIC_URL: https://urgent.amnesty.fr
      ADMIN_PUBLIC_URL: https://urgent.amnesty.fr/admin
      REACT_APP_API_URL: https://rapide.amnesty.fr
      REACT_APP_FRONT_BASE_URL: https://urgent.amnesty.fr
      UPLOAD_URL: https://rapide.amnesty.fr/api/static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.15.0'
      - name: Build
        run: |
          node .yarn/releases/yarn-3.2.1.cjs --version
          bash .clevercloud/static/build.sh
          mkdir -p dist/admin/
          cp -r front/build/. dist/
          cp -r admin/build/. dist/admin/
          cp .clevercloud/static/.htaccess dist/
          echo '<?php readfile(__DIR__ . "/index.html"); ?>' > dist/index.php
          ls -lh dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist/
          retention-days: 1

  deploy-api:
    name: Deploy API (Production)
    runs-on: ubuntu-latest
    environment:
      name: prod_api
      url: https://rapide.amnesty.fr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install clever-tools
        run: npm install -g clever-tools@4.10.0
      - name: Deploy API
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        run: |
          clever link app_34694fec-6a00-4c07-a001-6dac13102615
          clever deploy

  upload-static:
    name: Upload Static (Production)
    runs-on: ubuntu-latest
    needs: build-static
    environment:
      name: prod_static
      url: https://urgent.amnesty.fr
    steps:
      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: dist/
      - name: Sync to FTP
        env:
          FTP_HOST: ${{ secrets.PROD_FTP_HOST }}
          FTP_USER: ${{ secrets.PROD_FTP_USER }}
          FTP_PASSWORD: ${{ secrets.PROD_FTP_PASSWORD }}
        run: |
          ls -lh dist/
          rclone sync -v dist/ :ftp: \
            --ftp-host="$FTP_HOST" \
            --ftp-user="$FTP_USER" \
            --ftp-pass="$(rclone obscure "$FTP_PASSWORD")"
