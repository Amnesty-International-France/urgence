version: '3'

services:
    api:
        command: 'yarn run start'
        environment:
            - NODE_ENV=staging
            - POSTGRES_PASSWORD
            - CORS_ALLOWED_ORIGIN="https://urgent.amnesty.fr"
            - UPLOAD_DIR=/app/uploads
            - UPLOAD_URL=https://urgent.amnesty.fr/api/static
            - SMTP_HOST
            - SMTP_USER
            - SMTP_PASSWORD
            - SMTP_PORT
            - SMTP_SERVICE
            - SF_BASE_URL
            - SF_API_VERSION
            - SF_CONSUMER_KEY
            - SF_CONSUMER_SECRET
            - SF_USERNAME
            - SF_PASSWORD
            - SF_SECURITY_TOKEN
        volumes:
            - /home/amnesty/uploads:/app/uploads

    nginx:
        image: nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - .:/app
            - ./var/nginx/prod.conf:/etc/nginx/conf.d/default.conf
            - /home/amnesty/uploads:/app/uploads
            - /etc/letsencrypt/live/rapide.amnesty.fr/fullchain.pem:/etc/nginx/conf.d/selfsigned.crt
            - /etc/letsencrypt/live/rapide.amnesty.fr/privkey.pem:/etc/nginx/conf.d/selfsigned.key
        command:
            [sh, -c, "chmod -R o+X /app; chmod -R o+r /app/admin/build/; nginx -g 'daemon off;'"]
        depends_on:
            - api

    db:
        environment:
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD
            - POSTGRES_DB=reaction-rapide
        volumes:
            - '~/data:/var/lib/postgresql/data/'
