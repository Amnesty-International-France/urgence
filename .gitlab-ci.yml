stages:
  - test
  - build
  - deploy

variables:
  BROWSERSLIST_IGNORE_OLD_DATA: 'true'
  # don't treat warnings as errors
  CI: 'false'

.build: &build
  image: node:18
  tags:
    - yarn
  stage: build
  script:
    - node .yarn/releases/yarn-3.2.1.cjs --version
    - .clevercloud/static/build.sh
    - echo "transfer the compiled files"
    - cp --recursive front/build/ dist/
    - cp --recursive admin/build/ dist/admin/
    - cp .clevercloud/static/.htaccess dist/
    # the directory must exist
    - ls -lh ${PWD}/dist/
  artifacts:
    paths:
      - dist/
    expire_in: 24 hrs
    when: always

test_build_static:
  <<: *build
  stage: test
  variables:
    REF: $CI_COMMIT_REF_SLUG
    NODE_ENV: production
    REACT_APP_NODE_ENV: production
    FRONT_PUBLIC_URL: https://release.urgent.amnesty.fr
    ADMIN_PUBLIC_URL: https://release.urgent.amnesty.fr/admin
    REACT_APP_API_URL: https://release.rapide.amnesty.fr
    REACT_APP_FRONT_BASE_URL: https://release.urgent.amnesty.fr
    UPLOAD_URL: https://release.rapide.amnesty.fr/api/static
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # we don't need to store the artifacts
  artifacts: {}

test_build_api:
  <<: *build
  stage: test
  script:
    - .clevercloud/before.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # we don't need to store the artifacts
  artifacts: {}

build_static_release:
  <<: *build
  variables:
    REF: $CI_COMMIT_REF_SLUG
    NODE_ENV: production
    REACT_APP_NODE_ENV: production
    FRONT_PUBLIC_URL: https://release.urgent.amnesty.fr
    ADMIN_PUBLIC_URL: https://release.urgent.amnesty.fr/admin
    REACT_APP_API_URL: https://release.rapide.amnesty.fr
    REACT_APP_FRONT_BASE_URL: https://release.urgent.amnesty.fr
    UPLOAD_URL: https://release.rapide.amnesty.fr/api/static
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"

build_static_prod:
  <<: *build
  variables:
    REF: $CI_COMMIT_REF_SLUG
    NODE_ENV: production
    REACT_APP_NODE_ENV: production
    FRONT_PUBLIC_URL: https://urgent.amnesty.fr
    ADMIN_PUBLIC_URL: https://urgent.amnesty.fr/admin
    REACT_APP_API_URL: https://rapide.amnesty.fr
    REACT_APP_FRONT_BASE_URL: https://urgent.amnesty.fr
    UPLOAD_URL: https://rapide.amnesty.fr/api/static
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_BRANCH == "master"

##### Deploy #####
deploy_api_release:
  image:
    name: clevercloud/clever-tools:latest
    entrypoint: [ "/bin/sh", "-c" ]
  stage: deploy
  cache: [ ]
  script: |
    clever link ${APP_ID}
    clever deploy --force
  variables:
    APP_ID: app_eff241f8-4f37-48c9-bbb5-233a8d4a4a0b
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: release_api
    url: https://release.rapide.amnesty.fr
    deployment_tier: staging

deploy_api_prod:
  image:
    name: clevercloud/clever-tools:latest
    entrypoint: [ "/bin/sh", "-c" ]
  stage: deploy
  cache: [ ]
  script: |
    clever link ${APP_ID}
    clever deploy
  variables:
    APP_ID: app_34694fec-6a00-4c07-a001-6dac13102615
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_BRANCH == "master"
  environment:
    name: prod_api
    url: https://rapide.amnesty.fr
    deployment_tier: production

.upload: &upload
  stage: deploy
  image: alpine:latest
  before_script:
    - apk update && apk add --no-cache rclone
    - ls -lh ${PWD}/${DIRECTORY}
  # source: https://gitlab.com/stavros/neocities-gitlab-ci-demo/-/blob/41cf6bb4a58cfe50a68d51873f8e6fd0d5780fd0/.gitlab-ci.yml
  script: |
    rclone config create remote ftp host ${FTP_HOST} user ${FTP_USER} pass ${FTP_PASSWORD}
    rclone sync -v ${PWD}/${DIRECTORY} remote:

upload_static_content_release:
  <<: *upload
  dependencies: ['build_static_release']
  needs: ['build_static_release']
  variables:
    DIRECTORY: 'dist/'
  # source: https://gitlab.com/stavros/neocities-gitlab-ci-demo/-/blob/41cf6bb4a58cfe50a68d51873f8e6fd0d5780fd0/.gitlab-ci.yml
  script: |
    rclone config create remote ftp host ${DEVELOP_FTP_HOST} user ${DEVELOP_FTP_USER} pass ${DEVELOP_FTP_PASSWORD}
    rclone sync -v ${PWD}/${DIRECTORY} remote:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: release_static
    url: https://release.urgent.amnesty.fr
    deployment_tier: staging

upload_static_content_prod:
  <<: *upload
  dependencies: ['build_static_prod']
  needs: ['build_static_prod']
  variables:
    DIRECTORY: 'dist/'
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_BRANCH == "master"
  environment:
    name: prod_static
    url: https://urgent.amnesty.fr
    deployment_tier: production
