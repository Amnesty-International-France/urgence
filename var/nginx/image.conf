server {
    listen 80;

    server_name localhost;

    add_header   X-UA-Compatible "IE=edge";
    add_header   X-Frame-Options "SAMEORIGIN";

    location / {
        alias /app/uploads;
        expires 30d;
        add_header Vary Accept-Encoding;
    }

    error_log stderr;
    access_log stdout;
}
