version: '3'

services:
    api:
        image: node:9
        volumes:
            - ".:/app"
            - "./config:/app/config"
            - "/tmp:/tmp"
        environment:
            - NODE_ENV=development
            - HOME=/tmp
            - ADMIN_USERNAME
            - ADMIN_PASSWORD
            - JWT_SECRET_KEY
        working_dir: /app/api
        depends_on:
            - db

    db:
        image: postgres:10
        volumes:
            - "/etc/passwd:/etc/passwd:ro"
        expose:
            - "5432"
