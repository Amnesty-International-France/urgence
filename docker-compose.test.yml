version: '3'

services:
    test:
        image: node:18
        user: '${UID}:${GID}'
        command: 'yarn run test'
        working_dir: /app/api/
        volumes:
            - './:/app'
        environment:
            - NODE_ENV=test
            - POSTGRES_DATABASE=reaction-rapide-test
            - ADMIN_USERNAME=admin
            - ADMIN_PASSWORD=password
            - JWT_SECRET_KEY=foobarS3CR3T
            - REACT_APP_FRONT_BASE_URL=http://localhost:3000
            - REACT_APP_API_URL=http://localhost:4000
            - API_PREFIX_URL=
            - OPENSSL_CONF=/etc/ssl/
            - GITHUB_ACTIONS
        depends_on:
            - api

    api:
        user: '${UID}:${GID}'
        command: yarn run start-dev
        depends_on:
            - db
        environment:
            - NODE_ENV=test
            - JWT_SECRET_KEY=jwtsecret
            - POSTGRES_DATABASE=reaction-rapide-test
            - API_PREFIX_URL=
            - SMTP_HOST=maildev
            - SMTP_PORT=25
            - SMTP_IGNORE_TLS=true
            - SMTP_USER=
            - PM2_HOME=.pm2
            - SF_BASE_URL
            - SF_API_VERSION
            - SF_CONSUMER_KEY
            - SF_CONSUMER_SECRET
            - OPENSSL_CONF=/etc/ssl/
            - GITHUB_ACTIONS

    db:
        volumes:
            - amnesty-postgres-data:/var/lib/postgresql/data
        user: '${UID}:${GID}'
        environment:
            - NODE_ENV=test
            - POSTGRES_USER=amnesty
            - POSTGRES_PASSWORD=amnesty
            - POSTGRES_DB=reaction-rapide-test
            - PGDATA=/var/lib/postgresql/data/amnesty-test-3

    maildev:
        image: djfarrelly/maildev

volumes:
    amnesty-postgres-data: {}
